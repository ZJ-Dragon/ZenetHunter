

# Synced by the GitHub “Settings” App (probot). See: https://github.com/apps/settings
# Changes to this file on the default branch will be applied to the repo settings.

repository:
  default_branch: main

branches:
  - name: main
    protection:
      # Require PR + at least 1 approving review
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: false

      # Require status checks before merge (use stable check names)
      required_status_checks:
        strict: true
        contexts:
          - "Lint Commit Messages / commitlint"
          - "CI / ci (aggregate)"
          - "Image Build Check / image-check"

      # Apply to admins as well
      enforce_admins: true

      # Good defaults for healthy history & PR hygiene
      required_linear_history: true
      required_conversation_resolution: true

      # No push restrictions list here; keep null to avoid blocking merges by accident
      restrictions: null
