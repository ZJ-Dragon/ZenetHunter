name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4  # required to analyze changes
      - name: Paths filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'deploy/backend.Dockerfile'
              - '.pre-commit-config.yaml'
              - '.editorconfig'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - 'deploy/frontend.Dockerfile'
              - '.github/workflows/ci.yml'

  backend:
    name: Backend (Python ${{ matrix.python }})
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: [ '3.11', '3.12' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'                          # enable pip cache
          cache-dependency-path: |              # hash cache on these files when present
            backend/requirements*.txt
            backend/pyproject.toml

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          # Ensure test tools available if not defined as project deps
          pip install pytest

      - name: Run pre-commit (ruff/black + hygiene)
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files

      - name: Run tests
        working-directory: backend
        run: |
          pytest -q

  frontend:
    name: Frontend (Node ${{ matrix.node }})
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [ '20', '22' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: |
          if [ -f eslint.config.mjs ] || [ -f .eslintrc.* ]; then npm run -s lint; else echo "No ESLint config found; skipping"; fi

      - name: Build
        working-directory: frontend
        run: npm run -s build
