name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Paths filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'deploy/backend.Dockerfile'
              - '.pre-commit-config.yaml'
              - '.editorconfig'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - 'deploy/frontend.Dockerfile'
              - '.github/workflows/ci.yml'

  backend:
    name: backend
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: [ '3.11', '3.12' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements*.txt
            backend/pyproject.toml
            backend/setup.cfg
            backend/setup.py

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          # Fail loudly and show verbose output if installation fails
          pip install -e . -v
          # Install test tooling explicitly
          pip install pytest pytest-cov coverage httpx
          # Show dependency sanity check
          pip check || true

      - name: Run pre-commit (ruff/black + hygiene)
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files

      - name: Run tests with coverage (XML + summary)
        working-directory: backend
        run: |
          # show live pytest output to Actions console for better debug info
          pytest -q \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=markdown-append:$GITHUB_STEP_SUMMARY \
            --cov-report=term-missing \
            -o log_cli=true -o log_cli_level=INFO

      - name: Upload backend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-${{ matrix.python }}
          path: backend/coverage.xml
          if-no-files-found: ignore

  frontend:
    name: frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [ '20', '22' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: ./frontend
        run: npm ci

      - name: Lint
        working-directory: ./frontend
        run: |
          if [ -f eslint.config.mjs ] || [ -f .eslintrc.* ]; then npm run -s lint; else echo "No ESLint config found; skipping"; fi

      - name: Typecheck
        working-directory: ./frontend
        run: |
          npm run -s typecheck --if-present || npx -y typescript --noEmit

      - name: Build
        working-directory: ./frontend
        run: npm run -s build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ matrix.node }}
          path: |
            frontend/dist
            frontend/build
          if-no-files-found: ignore

  status:
    name: ci (aggregate)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: ${{ always() }}
    steps:
      - name: Aggregate job results for stable required check
        run: |
          echo "backend=${{ needs.backend.result }}"
          echo "frontend=${{ needs.frontend.result }}"
          if [ "${{ needs.backend.result }}" = "failure" ] || [ "${{ needs.frontend.result }}" = "failure" ]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All required jobs succeeded"
