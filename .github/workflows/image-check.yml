

name: Image Build Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: image-check: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            file: deploy/backend.Dockerfile
            context: .
          - name: frontend
            file: deploy/frontend.Dockerfile
            context: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU (for optional multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          # keep CI lightweight; adjust to linux/amd64,linux/arm64 if you need to validate both
          platforms: linux/amd64
          pull: true
          push: false
          load: false
          provenance: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  status:
    name: image-check
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ always() }}
    steps:
      - name: Aggregate job results for stable required check
        run: |
          echo "build=${{ needs.build.result }}"
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "One or more image builds failed"
            exit 1
          fi
          echo "All image builds succeeded"
