

name: Lint Commit Messages

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch all commits so the action can lint the full PR range
          fetch-depth: 0
      - name: Lint PR commits with commitlint
        uses: wagoid/commitlint-github-action@v6
        with:
          # Link shown in the action output to help contributors fix messages
          helpURL: https://www.conventionalcommits.org/en/v1.0.0/
