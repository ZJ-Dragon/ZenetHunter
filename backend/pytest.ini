

[pytest]
# Unified test runner options for CI and local runs
# Docs: pytest configuration (ini) + pytest-cov reporting/fail-under
# addopts precedence: pytest.ini takes priority over other config files
#   refs: https://docs.pytest.org/en/stable/reference/customize.html
addopts = -q --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=60 --cov-omit=app/core/engine/scapy.py --cov-omit=app/core/engine/xiaomi_router.py --cov-omit=app/core/engine/router_factory.py --cov-omit=app/services/attack.py --cov-omit=app/services/recognition/providers/* --cov-omit=app/services/recognition_engine.py --cov-omit=app/services/scanner/* --cov-omit=app/services/fingerprint_collector.py --cov-omit=app/routes/attack.py

# Default test discovery locations (adjust if your layout changes)
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
