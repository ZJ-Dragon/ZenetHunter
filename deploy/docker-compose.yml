name: zenethunter

# =============================================================================
# ZenetHunter Docker Compose Configuration
# =============================================================================
# Production-ready docker-compose setup for ZenetHunter
# Services: backend (FastAPI), frontend (nginx), db (PostgreSQL)
#
# Quick Start:
#   1. Copy env/.env.example to env/.env and customize
#   2. Run: docker compose up -d
#   3. Access: http://localhost:1226 (frontend), http://localhost:8000 (API)
#
# Features:
#   - Multi-stage builds with optimized production images
#   - Non-root user execution for security
#   - Health checks for service dependencies
#   - Named bridge network for stable DNS
#   - Persistent database volume
#   - Environment-based configuration (12-Factor)
#
# Notes:
#   - Top-level `name:` sets the Compose project name (see Docker docs)
#   - If unsupported, set COMPOSE_PROJECT_NAME=zenethunter in environment
#   - `depends_on.condition: service_healthy` requires Compose v2.1+
#   - Reads env vars from ./env/.env if present (do not commit secrets)
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: zh-db
    restart: unless-stopped
    # Security: Resource limits to prevent resource exhaustion
    deploy:
      resources:
        limits:
          cpus: '1.5'  # Limit to 1.5 CPU cores
          memory: 1G   # Limit to 1GB RAM
        reservations:
          cpus: '0.25'  # Guarantee at least 0.25 cores
          memory: 256M  # Guarantee at least 256MB RAM
    # Security: Run as non-root user (PostgreSQL default user)
    # Note: PostgreSQL requires write access to data directory, so read_only is not suitable
    # Security: Drop unnecessary capabilities (PostgreSQL needs some for data operations)
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    environment:
      POSTGRES_DB: zenethunter
      POSTGRES_USER: zenethunter
      POSTGRES_PASSWORD: zenethunter
      # Security: Disable unnecessary PostgreSQL features
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "zenethunter"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - zh_net

  backend:
    # Build runtime image from repository root using the deploy Dockerfile
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    image: zenethunter/backend:dev
    container_name: zh-backend
    # Security: Run as non-root user
    user: "101:101"
    restart: unless-stopped
    # Security: Read-only root filesystem with writable tmpfs
    read_only: true
    tmpfs:
      - /tmp
    # Security: Resource limits to prevent resource exhaustion
    deploy:
      resources:
        limits:
          cpus: '2.0'  # Limit to 2 CPU cores (suitable for DXP4800 Plus)
          memory: 2G   # Limit to 2GB RAM
        reservations:
          cpus: '0.5'  # Guarantee at least 0.5 cores
          memory: 512M # Guarantee at least 512MB RAM
    # Security: Drop all capabilities, add only required ones
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # Required for binding to port 8000
    # Security: Disable privilege escalation
    security_opt:
      - no-new-privileges:true
    # Environment variables can be loaded from .env file (optional)
    # Copy deploy/env/.env.example to deploy/env/.env and customize
    # If .env doesn't exist, defaults in environment: section will be used
    # Note: env_file is commented out to make it truly optional
    # Uncomment the line below if you have created env/.env file:
    # env_file:
    #   - ./env/.env
    environment:
      # Environment name: development, staging, or production
      # Controls default values for logging, CORS, and other settings
      APP_ENV: ${APP_ENV:-production}
      # Server configuration (can be overridden via .env file)
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      # Logging level (environment-specific defaults apply if not set)
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # API metadata (can be overridden via .env file)
      API_TITLE: ${API_TITLE:-ZenetHunter API}
      API_VERSION: ${API_VERSION:-0.1.0}
      # CORS origins (comma-separated, environment-specific defaults apply)
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:8080}
      # Database connection (DSN points to the Compose service name `db`)
      DATABASE_URL: ${DATABASE_URL:-postgresql://zenethunter:zenethunter@db:5432/zenethunter}
      # Security: Disable Python bytecode compilation (already set in Dockerfile)
      PYTHONDONTWRITEBYTECODE: 1
      # Security: Force unbuffered output for better logging
      PYTHONUNBUFFERED: 1
    depends_on:
      db:
        condition: service_healthy
    ports:
      # Expose API on host; adjust or remove on NAS if you prefer internal-only
      - "8000:8000"
    healthcheck:
      # Use the Python runtime inside the image to avoid requiring curl/wget
      # Security: Comprehensive health check with timeout
      test: [
        "CMD", "python", "-c",
        "import sys,urllib.request; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).getcode()==200 else sys.exit(1)"
      ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      zh_net:
        aliases:
          - api

  frontend:
    # Build static assets with Node, then serve via nginx
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
    image: zenethunter/frontend:dev
    container_name: zh-frontend
    # Security: Run as non-root user
    user: "101:101"
    restart: unless-stopped
    # Security: Read-only root filesystem with writable tmpfs
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    # Security: Resource limits to prevent resource exhaustion
    deploy:
      resources:
        limits:
          cpus: '1.0'  # Limit to 1 CPU core (nginx is lightweight)
          memory: 512M # Limit to 512MB RAM
        reservations:
          cpus: '0.25' # Guarantee at least 0.25 cores
          memory: 128M # Guarantee at least 128MB RAM
    # Security: Drop all capabilities, add only required ones
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # Required for binding to port 8080
    # Security: Disable privilege escalation
    security_opt:
      - no-new-privileges:true
    depends_on:
      backend:
        condition: service_healthy
    ports:
      # Map host 1226 -> container 8080 (non-root in-container port)
      - "1226:8080"
    healthcheck:
      # Alpine nginx base includes busybox wget; verify index responds
      # Security: Health check with timeout to prevent hanging
      test: ["CMD-SHELL", "wget -qO- --timeout=3 http://127.0.0.1:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      zh_net:
        aliases:
          - web

networks:
  zh_net:
    name: zenethunter_net
    driver: bridge
    # Security: Internal network (containers cannot access external networks)
    # Note: Set to false if containers need internet access
    internal: false
    # Security: Enable IPAM for better network isolation
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16

volumes:
  db_data:
    name: zenethunter_db_data
